<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFFSHIFT — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #000000;
  --white: #ffffff;
  --red: #c8102e;
  --red-hover: #a00d24;
  --gray-100: #f5f5f5;
  --gray-200: #e0e0e0;
  --gray-400: #888888;
  --gray-600: #555555;
  --gray-800: #1a1a1a;
  --gray-900: #0d0d0d;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-serif: 'Playfair Display', Georgia, serif;
}

body {
  font-family: var(--font-sans);
  background: var(--black);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Ambient background ── */
.ambient {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.ambient .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.12;
  animation: orbFloat 20s ease-in-out infinite alternate;
}
.ambient .orb:nth-child(1) {
  width: 600px; height: 600px;
  background: var(--red);
  top: -200px; left: -100px;
  animation-delay: 0s;
}
.ambient .orb:nth-child(2) {
  width: 400px; height: 400px;
  background: var(--red);
  bottom: -150px; right: -100px;
  animation-delay: -7s;
}
.ambient .orb:nth-child(3) {
  width: 300px; height: 300px;
  background: #fff;
  top: 50%; left: 60%;
  opacity: 0.04;
  animation-delay: -13s;
}
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(40px, -30px) scale(1.1); }
  100% { transform: translate(-20px, 20px) scale(0.95); }
}

/* ── Nav ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.25rem 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-sans);
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white);
  text-decoration: none;
}
.logo img {
  height: 38px;
  width: auto;
  object-fit: contain;
}
.logo span { color: var(--white); }
.nav-link {
  color: var(--gray-400);
  text-decoration: none;
  font-size: 0.85rem;
  letter-spacing: 0.05em;
  transition: color 0.3s;
}
.nav-link:hover { color: var(--white); }

/* ── Main container ── */
.login-container {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6rem 1.5rem 2rem;
}

.login-card {
  width: 100%;
  max-width: 440px;
  position: relative;
}

.login-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 25px;
  background: linear-gradient(135deg, rgba(200,16,46,0.3), transparent 50%, rgba(200,16,46,0.1));
  z-index: -1;
}

.login-inner {
  background: rgba(13,13,13,0.85);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border-radius: 24px;
  padding: 3rem 2.5rem;
  border: 1px solid rgba(255,255,255,0.06);
}

/* ── Heading ── */
.login-header {
  text-align: center;
  margin-bottom: 2.5rem;
}
.login-header h1 {
  font-family: var(--font-serif);
  font-size: 2rem;
  font-weight: 400;
  margin-bottom: 0.5rem;
}
.login-header p {
  color: var(--gray-400);
  font-size: 0.9rem;
  font-weight: 300;
}

/* ── Toggle (Sign In / Sign Up) ── */
.auth-toggle {
  display: flex;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 2rem;
  border: 1px solid rgba(255,255,255,0.06);
}
.auth-toggle button {
  flex: 1;
  padding: 0.65rem 1rem;
  background: transparent;
  border: none;
  color: var(--gray-400);
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  border-radius: 9px;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.auth-toggle button.active {
  background: var(--red);
  color: var(--white);
  box-shadow: 0 4px 20px rgba(200,16,46,0.35);
}

/* ── Social buttons ── */
.social-auth {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  margin-bottom: 1.75rem;
}
.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  width: 100%;
  padding: 0.85rem 1rem;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  color: var(--white);
  font-family: var(--font-sans);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
}
.social-btn:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-1px);
}
.social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.75rem;
  color: var(--gray-600);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.08);
}

/* ── Form fields ── */
.form-group {
  margin-bottom: 1.25rem;
  position: relative;
}
.form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--gray-400);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}
.form-group input {
  width: 100%;
  padding: 0.85rem 1rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: var(--white);
  font-family: var(--font-sans);
  font-size: 0.95rem;
  transition: all 0.3s;
  outline: none;
}
.form-group input::placeholder { color: var(--gray-600); }
.form-group input:focus {
  border-color: var(--red);
  background: rgba(200,16,46,0.04);
  box-shadow: 0 0 0 3px rgba(200,16,46,0.1);
}

.form-group .toggle-password {
  position: absolute;
  right: 1rem;
  top: 2.4rem;
  background: none;
  border: none;
  color: var(--gray-400);
  cursor: pointer;
  font-size: 0.85rem;
  transition: color 0.3s;
}
.form-group .toggle-password:hover { color: var(--white); }

/* ── Name row (sign up) ── */
.name-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}

/* ── Submit ── */
.submit-btn {
  width: 100%;
  padding: 1rem;
  margin-top: 0.5rem;
  background: var(--red);
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-family: var(--font-sans);
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.submit-btn:hover {
  background: var(--red-hover);
  transform: translateY(-1px);
  box-shadow: 0 8px 30px rgba(200,16,46,0.35);
}
.submit-btn:active { transform: translateY(0); }
.submit-btn.loading {
  pointer-events: none;
  opacity: 0.85;
}
.submit-btn .spinner {
  display: none;
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.submit-btn.loading .btn-text { display: none; }
.submit-btn.loading .spinner { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Forgot password ── */
.form-footer {
  text-align: center;
  margin-top: 1.25rem;
}
.form-footer a {
  color: var(--gray-400);
  font-size: 0.85rem;
  text-decoration: none;
  transition: color 0.3s;
}
.form-footer a:hover { color: var(--red); }

/* ── Error message ── */
.error-msg {
  background: rgba(200,16,46,0.1);
  border: 1px solid rgba(200,16,46,0.25);
  color: #ff6b7a;
  border-radius: 10px;
  padding: 0.75rem 1rem;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  display: none;
  animation: slideDown 0.3s ease;
}
.success-msg {
  background: rgba(46,200,16,0.1);
  border: 1px solid rgba(46,200,16,0.25);
  color: #6bff7a;
  border-radius: 10px;
  padding: 0.75rem 1rem;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  display: none;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Role selector (sign up) ── */
.role-selector {
  margin-bottom: 1.5rem;
}
.role-selector p {
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--gray-400);
  margin-bottom: 0.75rem;
  text-transform: uppercase;
}
.role-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}
.role-option {
  position: relative;
  padding: 1.25rem 1rem;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  text-align: center;
}
.role-option:hover {
  border-color: rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
}
.role-option.selected {
  border-color: var(--red);
  background: rgba(200,16,46,0.08);
  box-shadow: 0 0 0 3px rgba(200,16,46,0.12);
}
.role-option .role-icon {
  font-size: 1.6rem;
  margin-bottom: 0.5rem;
  display: block;
}
.role-option .role-label {
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  display: block;
}
.role-option .role-desc {
  font-size: 0.75rem;
  color: var(--gray-400);
  margin-top: 0.25rem;
  display: block;
}
.role-option input { display: none; }

/* ── Responsive ── */
@media (max-width: 500px) {
  .login-inner { padding: 2rem 1.5rem; }
  .login-header h1 { font-size: 1.6rem; }
  nav { padding: 1rem 1.25rem; }
  .logo { font-size: 1.1rem; }
  .name-row { grid-template-columns: 1fr; }
}
.brand-text { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.charleston { color: #c8102e; }
</style>
</head>
<body>

<!-- Ambient orbs -->
<div class="ambient">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<!-- Nav -->
<nav>
  <a href="index.html" class="logo">OFFSHIFT</a>
  <a href="index.html" class="nav-link">← Back to Home</a>
</nav>

<!-- Login Card -->
<div class="login-container">
  <div class="login-card">
    <div class="login-inner">

      <div class="login-header">
        <h1>Welcome to <em>OffShift</em></h1>
        <p id="headerSubtext">Sign in to your account</p>
      </div>

      <!-- Toggle -->
      <div class="auth-toggle">
        <button class="active" id="toggleSignIn" onclick="switchMode('signin')">Sign In</button>
        <button id="toggleSignUp" onclick="switchMode('signup')">Create Account</button>
      </div>

      <!-- Messages -->
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <!-- Social Auth -->
      <div class="social-auth">
        <button class="social-btn" id="googleBtn" onclick="signInWithGoogle()">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </div>

      <div class="divider">or</div>

      <!-- Email Form -->
      <form id="authForm" onsubmit="handleSubmit(event)">

        <!-- Name fields (sign up only) -->
        <div id="nameFields" style="display:none;">
          <div class="name-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="firstName" placeholder="Your first name" autocomplete="given-name">
            </div>
            <div class="form-group">
              <label>Last Initial</label>
              <input type="text" id="lastInitial" placeholder="e.g. R" maxlength="1" autocomplete="family-name">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePw()">Show</button>
        </div>

        <!-- Role selector (sign up only) -->
        <div id="roleSelector" class="role-selector" style="display:none;">
          <p>I am a…</p>
          <div class="role-options">
            <label class="role-option" onclick="selectRole(this, 'pro')">
              <input type="radio" name="role" value="pro">
              <span class="role-icon">🎨</span>
              <span class="role-label">Pro</span>
              <span class="role-desc">I offer my craft</span>
            </label>
            <label class="role-option" onclick="selectRole(this, 'client')">
              <input type="radio" name="role" value="client">
              <span class="role-icon">✨</span>
              <span class="role-label">Booker</span>
              <span class="role-desc">I'm booking talent</span>
            </label>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="form-footer" id="formFooter">
        <a href="#" onclick="resetPassword(); return false;">Forgot your password?</a>
      </div>

    </div>
  </div>
</div>

<!-- Firebase SDK (v10 modular via compat for simplicity) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ─── Firebase Config ───
// ⚠️  REPLACE with your own Firebase project config
const firebaseConfig = {
  apiKey: "AIzaSyDNOD676C2uh87ggzmSZFNldI2eyI-ECOQ",
  authDomain: "offshift-charleston.firebaseapp.com",
  projectId: "offshift-charleston",
  storageBucket: "offshift-charleston.firebasestorage.app",
  messagingSenderId: "168641222703",
  appId: "1:168641222703:web:63c86ca2ce807272a8ceda"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let mode = 'signin';
let selectedRole = null;

// ─── Mode Switch ───
function switchMode(m) {
  mode = m;
  const nameFields = document.getElementById('nameFields');
  const roleSelector = document.getElementById('roleSelector');
  const btnText = document.querySelector('.btn-text');
  const subtext = document.getElementById('headerSubtext');
  const footer = document.getElementById('formFooter');
  const toggleIn = document.getElementById('toggleSignIn');
  const toggleUp = document.getElementById('toggleSignUp');

  clearMessages();

  if (m === 'signup') {
    nameFields.style.display = 'block';
    roleSelector.style.display = 'block';
    btnText.textContent = 'Create Account';
    subtext.textContent = 'Join the OffShift community';
    footer.innerHTML = '';
    toggleUp.classList.add('active');
    toggleIn.classList.remove('active');
    document.getElementById('password').setAttribute('autocomplete', 'new-password');
  } else {
    nameFields.style.display = 'none';
    roleSelector.style.display = 'none';
    btnText.textContent = 'Sign In';
    subtext.textContent = 'Sign in to your account';
    footer.innerHTML = '<a href="#" onclick="resetPassword(); return false;">Forgot your password?</a>';
    toggleIn.classList.add('active');
    toggleUp.classList.remove('active');
    document.getElementById('password').setAttribute('autocomplete', 'current-password');
  }
}

// ─── Role Selection ───
function selectRole(el, role) {
  document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedRole = role;
}

// ─── Toggle Password ───
function togglePw() {
  const pw = document.getElementById('password');
  const btn = document.querySelector('.toggle-password');
  if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'Hide'; }
  else { pw.type = 'password'; btn.textContent = 'Show'; }
}

// ─── Messages ───
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}
function clearMessages() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}

// ─── Google Sign-In ───
async function signInWithGoogle() {
  clearMessages();
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result = await auth.signInWithPopup(provider);
    const user = result.user;

    // Check if user profile exists in Firestore
    const doc = await db.collection('users').doc(user.uid).get();
    if (!doc.exists) {
      // New user — redirect to role selection then profile builder
      await db.collection('users').doc(user.uid).set({
        email: user.email,
        displayName: user.displayName,
        photoURL: user.photoURL,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        profileComplete: false
      });
      // Need to pick role — show selector
      switchMode('signup');
      showSuccess('Welcome! Choose your role below to continue.');
      document.getElementById('nameFields').style.display = 'none';
      document.getElementById('email').closest('.form-group').style.display = 'none';
      document.getElementById('password').closest('.form-group').style.display = 'none';
      document.querySelector('.submit-btn .btn-text').textContent = 'Continue';
      return;
    }

    const data = doc.data();
    redirectByRole(data.role, data.profileComplete);
  } catch (err) {
    if (err.code !== 'auth/popup-closed-by-user') showError(err.message);
  }
}

// ─── Email/Password Submit ───
async function handleSubmit(e) {
  e.preventDefault();
  clearMessages();

  const btn = document.getElementById('submitBtn');
  btn.classList.add('loading');

  try {
    // Google user picking a role — already signed in, just save role and redirect
    const currentUser = auth.currentUser;
    if (mode === 'signup' && currentUser && currentUser.providerData.some(p => p.providerId === 'google.com')) {
      if (!selectedRole) { showError('Please select whether you are a Pro or a Booker.'); btn.classList.remove('loading'); return; }
      await db.collection('users').doc(currentUser.uid).update({
        role: selectedRole
      });
      redirectByRole(selectedRole, false);
      return;
    }

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (mode === 'signup') {
      if (!selectedRole) { showError('Please select whether you are a Pro or a Booker.'); btn.classList.remove('loading'); return; }
      const firstName = document.getElementById('firstName').value.trim();
      const lastInitial = document.getElementById('lastInitial').value.trim().toUpperCase();
      if (!firstName) { showError('Please enter your first name.'); btn.classList.remove('loading'); return; }

      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await cred.user.updateProfile({ displayName: `${firstName} ${lastInitial}.` });

      await db.collection('users').doc(cred.user.uid).set({
        email: email,
        firstName: firstName,
        lastInitial: lastInitial,
        displayName: `${firstName} ${lastInitial}.`,
        role: selectedRole,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        profileComplete: false
      });

      redirectByRole(selectedRole, false);

    } else {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      const doc = await db.collection('users').doc(cred.user.uid).get();
      const data = doc.data();
      redirectByRole(data.role, data.profileComplete);
    }
  } catch (err) {
    const msgs = {
      'auth/email-already-in-use': 'This email is already registered. Try signing in.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password should be at least 6 characters.',
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password. Please try again.',
      'auth/invalid-credential': 'Invalid email or password.',
      'auth/too-many-requests': 'Too many attempts. Please try again later.'
    };
    showError(msgs[err.code] || err.message);
  }
  btn.classList.remove('loading');
}

// ─── Password Reset ───
async function resetPassword() {
  clearMessages();
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Enter your email above, then click "Forgot your password?"'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showSuccess('Password reset email sent! Check your inbox.');
  } catch (err) {
    showError(err.message);
  }
}

// ─── Redirect ───
function redirectByRole(role, profileComplete) {
  if (!profileComplete) {
    window.location.href = role === 'pro' ? 'pro-profile.html' : 'client-profile.html';
  } else {
    window.location.href = 'browse.html';
  }
}

// ─── Auth State Listener ───
auth.onAuthStateChanged(user => {
  if (user) {
    db.collection('users').doc(user.uid).get().then(doc => {
      if (doc.exists) {
        const data = doc.data();
        if (data.profileComplete) {
          window.location.href = 'browse.html';
        }
      }
    });
  }
});
</script>
