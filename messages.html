<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="logo.png">
<title>OFFSHIFT — Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a; --dark: #111; --dark-card: #141414; --dark-border: #222;
  --white: #f5f5f5; --white-pure: #fff;
  --red: #c8102e; --red-hover: #a00d24; --red-glow: rgba(200,16,46,0.3); --red-subtle: rgba(200,16,46,0.06);
  --green: #34C759; --green-subtle: rgba(52,199,89,0.1); --green-border: rgba(52,199,89,0.25);
  --orange: #FF9500; --orange-subtle: rgba(255,149,0,0.1); --orange-border: rgba(255,149,0,0.25);
  --blue: #007AFF; --blue-subtle: rgba(0,122,255,0.12); --blue-border: rgba(0,122,255,0.3);
  --gray: #a0a0a0; --gray-light: #c4c4c4; --gray-dark: #333; --gray-muted: #8a8a8a;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Inter', -apple-system, sans-serif;
  --radius: 16px; --radius-sm: 10px;
  --transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
}
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--black); color: var(--white); -webkit-font-smoothing: antialiased; overflow: hidden; }
a { color: inherit; text-decoration: none; }

/* Nav */
nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 0 48px; height: 72px; display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,10,0.95); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.04); }
.nav-logo { font-family: var(--sans); font-weight: 700; font-size: 1.15rem; letter-spacing: 0.12em; text-transform: uppercase; }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-light); transition: color 0.3s; }
.nav-links a:hover { color: var(--white); }
.nav-links a.active { color: var(--white); }
.nav-user { display: flex; align-items: center; gap: 12px; }
.nav-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--gray-dark); border: 2px solid var(--red); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; overflow: hidden; }
.nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
.nav-signout { font-size: 0.75rem; color: var(--gray); cursor: pointer; transition: color 0.3s; background: none; border: none; font-family: var(--sans); }
.nav-signout:hover { color: var(--red); }

/* Layout — sidebar + chat */
.msg-layout {
  display: grid; grid-template-columns: 340px 1fr;
  height: calc(100vh - 72px); margin-top: 72px;
}

/* ===== SIDEBAR ===== */
.msg-sidebar {
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; overflow: hidden;
  background: rgba(10,10,10,0.5);
}
.sidebar-header {
  padding: 20px 24px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sidebar-title { font-family: var(--serif); font-size: 1.2rem; font-weight: 400; margin-bottom: 12px; }
.sidebar-title em { color: var(--red); font-style: italic; }
.sidebar-search {
  width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  color: var(--white); font-family: var(--sans); font-size: 0.82rem; outline: none;
  transition: var(--transition);
}
.sidebar-search::placeholder { color: var(--gray-dark); }
.sidebar-search:focus { border-color: var(--red); background: rgba(255,255,255,0.06); }

.thread-list { flex: 1; overflow-y: auto; }
.thread-list::-webkit-scrollbar { width: 4px; }
.thread-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.thread-item {
  display: flex; gap: 12px; padding: 16px 24px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.2s;
  position: relative;
}
.thread-item:hover { background: rgba(255,255,255,0.03); }
.thread-item.active { background: rgba(200,16,46,0.06); border-left: 3px solid var(--red); }
.thread-item.unread::after {
  content: ''; position: absolute; top: 20px; right: 20px;
  width: 8px; height: 8px; border-radius: 50%; background: var(--red);
  box-shadow: 0 0 8px var(--red-glow);
}
.thread-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  background: var(--gray-dark); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 700;
}
.thread-avatar img { width: 100%; height: 100%; object-fit: cover; }
.thread-info { flex: 1; min-width: 0; }
.thread-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thread-preview { font-size: 0.75rem; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thread-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.thread-time { font-size: 0.65rem; color: var(--gray-muted); }
.thread-booking-badge {
  font-size: 0.6rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 100px;
}
.badge-pending { background: var(--orange-subtle); color: var(--orange); }
.badge-confirmed { background: var(--green-subtle); color: var(--green); }
.badge-declined { background: var(--red-subtle); color: var(--red); }

.sidebar-empty { padding: 40px 24px; text-align: center; color: var(--gray-muted); font-size: 0.85rem; }

/* ===== CHAT AREA ===== */
.chat-area { display: flex; flex-direction: column; overflow: hidden; }

/* Chat header */
.chat-header {
  padding: 16px 28px; border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 14px; background: rgba(10,10,10,0.5);
}
.chat-header-back {
  display: none; width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04); align-items: center; justify-content: center; cursor: pointer;
}
.chat-header-back svg { width: 16px; height: 16px; color: var(--gray-light); }
.chat-header-avatar {
  width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
  background: var(--gray-dark); display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.8rem;
}
.chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
.chat-header-info { flex: 1; }
.chat-header-name { font-size: 0.95rem; font-weight: 600; }
.chat-header-sub { font-size: 0.72rem; color: var(--gray); }
.chat-header-booking {
  padding: 6px 16px; border-radius: 8px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08); font-size: 0.72rem; font-weight: 500;
  color: var(--gray-light); cursor: pointer; transition: var(--transition);
  font-family: var(--sans);
}
.chat-header-booking:hover { background: rgba(255,255,255,0.08); color: var(--white); }

/* Messages */
.chat-messages {
  flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 4px;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.msg-date-divider {
  text-align: center; padding: 16px 0 8px; font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-muted);
}

.msg-bubble-wrap { display: flex; margin-bottom: 2px; }
.msg-bubble-wrap.mine { justify-content: flex-end; }
.msg-bubble-wrap.theirs { justify-content: flex-start; }

.msg-bubble {
  max-width: 70%; padding: 12px 16px; border-radius: 18px;
  font-size: 0.88rem; line-height: 1.55; word-wrap: break-word;
  position: relative;
}
.msg-bubble-wrap.mine .msg-bubble {
  background: var(--red); color: var(--white-pure);
  border-bottom-right-radius: 6px;
}
.msg-bubble-wrap.theirs .msg-bubble {
  background: rgba(255,255,255,0.08); color: var(--white);
  border-bottom-left-radius: 6px;
}
.msg-time {
  font-size: 0.6rem; color: rgba(255,255,255,0.4); margin-top: 4px;
  display: none;
}
.msg-bubble-wrap:hover .msg-time { display: block; }
.msg-bubble-wrap.mine .msg-time { text-align: right; }

/* System messages */
.msg-system {
  text-align: center; padding: 8px 16px; margin: 8px 0;
  font-size: 0.75rem; color: var(--gray-muted); font-style: italic;
}

/* Chat input */
.chat-input-bar {
  padding: 16px 28px; border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; gap: 12px; align-items: flex-end; background: rgba(10,10,10,0.5);
}
.chat-input {
  flex: 1; padding: 14px 18px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
  color: var(--white); font-family: var(--sans); font-size: 0.88rem;
  outline: none; resize: none; max-height: 120px; line-height: 1.5;
  transition: var(--transition);
}
.chat-input::placeholder { color: var(--gray-dark); }
.chat-input:focus { border-color: var(--red); background: rgba(255,255,255,0.07); }

.chat-send {
  width: 48px; height: 48px; border-radius: 50%; border: none;
  background: var(--red); color: var(--white-pure); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition); flex-shrink: 0;
  box-shadow: 0 4px 16px var(--red-glow);
}
.chat-send:hover { background: var(--red-hover); transform: scale(1.05); }
.chat-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.chat-send svg { width: 20px; height: 20px; }

/* Empty chat state */
.chat-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--gray-muted); text-align: center; padding: 40px;
}
.chat-empty .icon { font-size: 3rem; opacity: 0.2; margin-bottom: 16px; }
.chat-empty h3 { font-family: var(--serif); font-size: 1.2rem; font-weight: 400; color: var(--gray); margin-bottom: 8px; }
.chat-empty p { font-size: 0.85rem; max-width: 300px; }

/* Loading */
.loading-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--black); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; transition: opacity 0.5s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; top: 88px; right: 24px; padding: 14px 24px; background: var(--dark-card); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; font-size: 0.85rem; font-weight: 500; color: var(--white); z-index: 2000; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.toast.success { border-color: rgba(52,199,89,0.3); }
.toast.show { transform: translateX(0); }

/* Responsive */
@media (max-width: 900px) {
  nav { padding: 0 20px; }
  .msg-layout { grid-template-columns: 1fr; }
  .msg-sidebar { display: flex; }
  .msg-sidebar.thread-open { display: none; }
  .chat-area { display: none; }
  .chat-area.thread-open { display: flex; }
  .chat-header-back { display: flex; }
  .chat-messages { padding: 16px; }
  .chat-input-bar { padding: 12px 16px; }
  .msg-bubble { max-width: 85%; }
}
.brand-text { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.charleston { color: #c8102e; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
<div class="toast" id="toast"></div>

<nav>
  <a href="index.html" class="nav-logo">OFFSHIFT</a>
  <div class="nav-links">
    <a href="browse.html">Browse</a>
    <a href="swag.html">Swag</a>
    <a href="pro-dashboard.html">Dashboard</a>
    <a href="messages.html" class="active">Messages</a>
  </div>
  <div class="nav-user">
    <a href="pro-dashboard.html" class="nav-avatar" id="navAvatar" title="Dashboard"><span id="navInitials">?</span></a>
    <button class="nav-signout" id="signOutBtn">Sign Out</button>
  </div>
</nav>

<div class="msg-layout">
  <!-- Sidebar: Thread list -->
  <div class="msg-sidebar" id="msgSidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Your <em>Messages</em></div>
      <input type="text" class="sidebar-search" id="threadSearch" placeholder="Search conversations...">
    </div>
    <div class="thread-list" id="threadList">
      <div class="sidebar-empty">No conversations yet. Messages will appear here when you have booking activity.</div>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="chat-empty" id="chatEmpty">
      <div class="icon">&#128172;</div>
      <h3>Select a conversation</h3>
      <p>Choose a booking thread from the sidebar to start messaging.</p>
    </div>

    <div id="chatActive" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-header" id="chatHeader">
        <button class="chat-header-back" id="chatBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="chat-header-avatar" id="chatAvatar"></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatName"></div>
          <div class="chat-header-sub" id="chatSub"></div>
        </div>
        <button class="chat-header-booking" id="chatBookingBtn">View Booking</button>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-bar">
        <textarea class="chat-input" id="chatInput" rows="1" placeholder="Type a message..."></textarea>
        <button class="chat-send" id="chatSend" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="notifications.js"></script>
<script src="mobile-nav.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDNOD676C2uh87ggzmSZFNldI2eyI-ECOQ",
  authDomain: "offshift-charleston.firebaseapp.com",
  projectId: "offshift-charleston",
  storageBucket: "offshift-charleston.firebasestorage.app",
  messagingSenderId: "168641222703",
  appId: "1:168641222703:web:63c86ca2ce807272a8ceda"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const $ = id => document.getElementById(id);
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser = null;
let allBookings = [];
let activeBookingId = null;
let activeBooking = null;
let msgUnsub = null; // message listener unsubscribe

// Check URL for pre-selected booking
const params = new URLSearchParams(window.location.search);
const urlBookingId = params.get('booking');

// ─── Auth ───
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  initNotifications(user.uid);

  const initials = user.displayName ? user.displayName.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) : user.email[0].toUpperCase();
  $('navInitials').textContent = initials;
  if (user.photoURL) $('navAvatar').innerHTML = `<img src="${user.photoURL}" alt="">`;

  // Load bookings where user is client OR pro
  loadThreads();
  $('loadingOverlay').classList.add('hidden');
});

// ─── Load booking threads ───
function loadThreads() {
  // We need bookings where user is either client or pro
  // Firestore doesn't support OR queries across fields, so we do two queries
  const q1 = db.collection('bookings').where('clientId', '==', currentUser.uid).orderBy('updatedAt', 'desc');
  const q2 = db.collection('bookings').where('proId', '==', currentUser.uid).orderBy('updatedAt', 'desc');

  let results1 = [], results2 = [];
  let loaded = 0;

  function merge() {
    loaded++;
    if (loaded < 2) return;
    const map = new Map();
    [...results1, ...results2].forEach(b => map.set(b.id, b));
    allBookings = [...map.values()].sort((a, b) => {
      const ta = a.lastMessageAt || a.updatedAt || a.createdAt;
      const tb = b.lastMessageAt || b.updatedAt || b.createdAt;
      if (!ta || !tb) return 0;
      return (tb.toDate ? tb.toDate() : tb) - (ta.toDate ? ta.toDate() : ta);
    });
    renderThreads();
    // Auto-open from URL
    if (urlBookingId && !activeBookingId) {
      const found = allBookings.find(b => b.id === urlBookingId);
      if (found) openThread(found.id);
    }
  }

  q1.onSnapshot(snap => {
    results1 = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    merge();
  }, err => { console.error(err); loaded++; merge(); });

  q2.onSnapshot(snap => {
    results2 = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    merge();
  }, err => { console.error(err); loaded++; merge(); });
}

// ─── Render thread list ───
function renderThreads(filter = '') {
  const list = $('threadList');
  let filtered = allBookings;

  if (filter) {
    const f = filter.toLowerCase();
    filtered = allBookings.filter(b =>
      (b.proName || '').toLowerCase().includes(f) ||
      (b.clientName || '').toLowerCase().includes(f) ||
      (b.proCraft || '').toLowerCase().includes(f)
    );
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">No conversations yet.</div>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(b => {
    const isPro = b.proId === currentUser.uid;
    const otherName = isPro ? (b.clientName || 'Booker') : (b.proName || 'Pro');
    const otherPhoto = isPro ? (b.clientPhoto || '') : '';
    const initial = otherName[0].toUpperCase();

    const item = document.createElement('div');
    item.className = 'thread-item' + (b.id === activeBookingId ? ' active' : '');
    if (b.unreadBy && b.unreadBy[currentUser.uid]) item.className += ' unread';

    const preview = b.lastMessage || `Booking for ${formatDateShort(b.date)}`;
    const timeStr = b.lastMessageAt ? timeAgo(b.lastMessageAt) : '';
    const badgeClass = b.status === 'confirmed' ? 'badge-confirmed' : b.status === 'declined' ? 'badge-declined' : 'badge-pending';

    item.innerHTML = `
      <div class="thread-avatar">${otherPhoto ? `<img src="${otherPhoto}" alt="">` : initial}</div>
      <div class="thread-info">
        <div class="thread-name">${escapeHtml(otherName)}</div>
        <div class="thread-preview">${escapeHtml(preview)}</div>
        <div class="thread-meta">
          <span class="thread-time">${timeStr}</span>
          <span class="thread-booking-badge ${badgeClass}">${b.status}</span>
        </div>
      </div>
    `;

    item.onclick = () => openThread(b.id);
    list.appendChild(item);
  });
}

$('threadSearch').addEventListener('input', e => renderThreads(e.target.value));

// ─── Open thread ───
function openThread(bookingId) {
  activeBookingId = bookingId;
  activeBooking = allBookings.find(b => b.id === bookingId);
  if (!activeBooking) return;

  // Update UI
  $('chatEmpty').style.display = 'none';
  $('chatActive').style.display = 'flex';

  // Mobile: show chat, hide sidebar
  $('msgSidebar').classList.add('thread-open');
  $('chatArea').classList.add('thread-open');

  // Header
  const isPro = activeBooking.proId === currentUser.uid;
  const otherName = isPro ? (activeBooking.clientName || 'Booker') : (activeBooking.proName || 'Pro');
  const otherPhoto = isPro ? (activeBooking.clientPhoto || '') : '';
  $('chatName').textContent = otherName;
  $('chatSub').textContent = `${activeBooking.proCraft || ''} · ${formatDateShort(activeBooking.date)} · $${activeBooking.estimatedTotal || 0}`;

  if (otherPhoto) {
    $('chatAvatar').innerHTML = `<img src="${otherPhoto}" alt="">`;
  } else {
    $('chatAvatar').textContent = otherName[0].toUpperCase();
  }

  // Mark as read
  if (activeBooking.unreadBy && activeBooking.unreadBy[currentUser.uid]) {
    db.collection('bookings').doc(bookingId).update({
      [`unreadBy.${currentUser.uid}`]: false
    });
  }

  // Re-render threads to show active state
  renderThreads($('threadSearch').value);

  // Listen to messages
  if (msgUnsub) msgUnsub();
  const messagesRef = db.collection('bookings').doc(bookingId).collection('messages').orderBy('createdAt', 'asc');
  msgUnsub = messagesRef.onSnapshot(snap => {
    renderMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    // Mark read
    db.collection('bookings').doc(bookingId).update({
      [`unreadBy.${currentUser.uid}`]: false
    }).catch(() => {});
  });
}

// ─── Render messages ───
function renderMessages(messages) {
  const container = $('chatMessages');
  container.innerHTML = '';

  // System message for booking creation
  if (activeBooking) {
    const sys = document.createElement('div');
    sys.className = 'msg-system';
    sys.textContent = `Booking created for ${formatDateShort(activeBooking.date)} · ${activeBooking.proCraft}`;
    container.appendChild(sys);
  }

  let lastDate = '';
  messages.forEach(msg => {
    // Date divider
    const msgDate = msg.createdAt ? formatDateShort2(msg.createdAt) : '';
    if (msgDate && msgDate !== lastDate) {
      lastDate = msgDate;
      const divider = document.createElement('div');
      divider.className = 'msg-date-divider';
      divider.textContent = msgDate;
      container.appendChild(divider);
    }

    if (msg.type === 'system') {
      const sys = document.createElement('div');
      sys.className = 'msg-system';
      sys.textContent = msg.text;
      container.appendChild(sys);
      return;
    }

    const isMine = msg.senderId === currentUser.uid;
    const wrap = document.createElement('div');
    wrap.className = 'msg-bubble-wrap ' + (isMine ? 'mine' : 'theirs');

    const timeStr = msg.createdAt ? formatTime(msg.createdAt) : '';
    wrap.innerHTML = `
      <div>
        <div class="msg-bubble">${escapeHtml(msg.text)}</div>
        <div class="msg-time">${timeStr}</div>
      </div>
    `;
    container.appendChild(wrap);
  });

  // Scroll to bottom
  container.scrollTop = container.scrollHeight;
}

// ─── Send message ───
const chatInput = $('chatInput');
const chatSend = $('chatSend');

chatInput.addEventListener('input', () => {
  chatSend.disabled = !chatInput.value.trim();
  // Auto-resize
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

chatSend.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || !activeBookingId) return;

  chatInput.value = '';
  chatInput.style.height = 'auto';
  chatSend.disabled = true;

  const isPro = activeBooking.proId === currentUser.uid;
  const otherUserId = isPro ? activeBooking.clientId : activeBooking.proId;

  try {
    // Add message to subcollection
    await db.collection('bookings').doc(activeBookingId).collection('messages').add({
      senderId: currentUser.uid,
      senderName: currentUser.displayName || currentUser.email,
      text: text,
      type: 'message',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Update booking with last message preview and unread flag
    await db.collection('bookings').doc(activeBookingId).update({
      lastMessage: text,
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessageBy: currentUser.uid,
      [`unreadBy.${otherUserId}`]: true,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Create notification for the other user
    await db.collection('notifications').add({
      userId: otherUserId,
      type: 'new_message',
      bookingId: activeBookingId,
      fromName: currentUser.displayName || currentUser.email,
      message: text.length > 60 ? text.slice(0, 60) + '...' : text,
      read: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (err) {
    console.error('Send error:', err);
    showToast('Failed to send', 'error');
  }
}

// ─── Back button (mobile) ───
$('chatBack').addEventListener('click', () => {
  activeBookingId = null;
  $('msgSidebar').classList.remove('thread-open');
  $('chatArea').classList.remove('thread-open');
  if (msgUnsub) { msgUnsub(); msgUnsub = null; }
  renderThreads($('threadSearch').value);
});

// ─── View booking ───
$('chatBookingBtn').addEventListener('click', () => {
  if (!activeBooking) return;
  const isPro = activeBooking.proId === currentUser.uid;
  window.location.href = isPro ? 'pro-bookings.html' : 'client-bookings.html';
});

// ─── Helpers ───
function formatDateShort(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${MONTHS[parseInt(m)-1]} ${parseInt(day)}`;
}

function formatDateShort2(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return 'Today';
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return `${MONTHS[d.getMonth()]} ${d.getDate()}`;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function timeAgo(ts) {
  if (!ts) return '';
  const now = Date.now();
  const then = ts.toDate ? ts.toDate().getTime() : ts;
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60) return 'now';
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d`;
  const d = new Date(then);
  return `${MONTHS[d.getMonth()]} ${d.getDate()}`;
}

function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showToast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '') + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

$('signOutBtn').onclick = async () => { await auth.signOut(); window.location.href = 'login.html'; };
