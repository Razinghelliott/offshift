<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFFSHIFT — Bookings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a; --dark: #111111; --dark-card: #141414; --dark-border: #222222;
  --white: #f5f5f5; --white-pure: #ffffff;
  --red: #c8102e; --red-hover: #a00d24; --red-glow: rgba(200,16,46,0.3); --red-subtle: rgba(200,16,46,0.06);
  --green: #34C759; --green-subtle: rgba(52,199,89,0.1); --green-border: rgba(52,199,89,0.25);
  --orange: #FF9500; --orange-subtle: rgba(255,149,0,0.1); --orange-border: rgba(255,149,0,0.25);
  --gray: #888; --gray-light: #aaa; --gray-dark: #333; --gray-muted: #666;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Inter', -apple-system, sans-serif;
  --radius: 16px; --radius-sm: 10px;
  --transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--black); color: var(--white); overflow-x: hidden; -webkit-font-smoothing: antialiased; min-height: 100vh; }
a { color: inherit; text-decoration: none; }

.ambient { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.ambient .orb { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.08; animation: orbFloat 25s ease-in-out infinite alternate; }
.ambient .orb:nth-child(1) { width: 700px; height: 700px; background: var(--red); top: -300px; left: -200px; }
.ambient .orb:nth-child(2) { width: 500px; height: 500px; background: var(--red); bottom: -200px; right: -150px; animation-delay: -8s; }
@keyframes orbFloat { 0%{transform:translate(0,0)scale(1)}50%{transform:translate(50px,-40px)scale(1.1)}100%{transform:translate(-30px,25px)scale(0.95)} }

nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 0 48px; height: 72px; display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,10,0.92); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.04); }
.nav-logo { font-family: var(--sans); font-weight: 700; font-size: 1.15rem; letter-spacing: 0.12em; text-transform: uppercase; }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-light); transition: color 0.3s; position: relative; }
.nav-links a::after { content:''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--red); transition: width 0.3s; }
.nav-links a:hover { color: var(--white); }
.nav-links a:hover::after { width: 100%; }
.nav-links a.active { color: var(--white); }
.nav-links a.active::after { width: 100%; }
.nav-user { display: flex; align-items: center; gap: 12px; }
.nav-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--gray-dark); border: 2px solid var(--red); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--white); overflow: hidden; }
.nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
.nav-signout { font-size: 0.75rem; color: var(--gray); cursor: pointer; transition: color 0.3s; background: none; border: none; font-family: var(--sans); }
.nav-signout:hover { color: var(--red); }

.page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 92px 48px 100px; }
.page-header { margin-bottom: 40px; }
.page-header h1 { font-family: var(--serif); font-size: 2rem; font-weight: 400; margin-bottom: 8px; }
.page-header h1 em { font-style: italic; color: var(--red); }
.page-header p { color: var(--gray); font-size: 0.9rem; font-weight: 300; }

.sub-nav { display: flex; gap: 4px; margin-bottom: 36px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.sub-nav a { padding: 12px 24px; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.04em; color: var(--gray); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: var(--transition); }
.sub-nav a:hover { color: var(--white); }
.sub-nav a.active { color: var(--white); border-bottom-color: var(--red); }

/* Filter tabs */
.filter-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.filter-tab {
  padding: 8px 18px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03); color: var(--gray-light); font-size: 0.78rem;
  font-weight: 500; cursor: pointer; transition: var(--transition); font-family: var(--sans);
  display: inline-flex; align-items: center; gap: 6px;
}
.filter-tab:hover { background: rgba(255,255,255,0.06); color: var(--white); }
.filter-tab.active { background: var(--red); border-color: var(--red); color: var(--white-pure); box-shadow: 0 4px 16px var(--red-glow); }
.filter-tab .count { padding: 1px 7px; border-radius: 100px; font-size: 0.65rem; font-weight: 700; background: rgba(255,255,255,0.12); }
.filter-tab.active .count { background: rgba(255,255,255,0.2); }

/* Booking cards */
.bookings-list { display: flex; flex-direction: column; gap: 16px; }

.booking-card {
  background: var(--dark-card); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 20px; padding: 24px 28px; transition: var(--transition);
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.booking-card:hover { border-color: rgba(255,255,255,0.1); }

.booking-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.booking-client { display: flex; align-items: center; gap: 14px; }
.booking-client-photo { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; background: var(--gray-dark); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; }
.booking-client-photo img { width: 100%; height: 100%; object-fit: cover; }
.booking-client-name { font-weight: 600; font-size: 0.95rem; }
.booking-client-email { font-size: 0.75rem; color: var(--gray); }

.booking-status {
  padding: 5px 14px; border-radius: 100px; font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.status-pending { background: var(--orange-subtle); border: 1px solid var(--orange-border); color: var(--orange); }
.status-confirmed { background: var(--green-subtle); border: 1px solid var(--green-border); color: var(--green); }
.status-declined { background: var(--red-subtle); border: 1px solid rgba(200,16,46,0.2); color: var(--red); }
.status-completed { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--gray); }

.booking-details { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.booking-detail { padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; }
.booking-detail-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-muted); margin-bottom: 4px; }
.booking-detail-value { font-size: 0.9rem; font-weight: 600; }

.booking-message { padding: 14px 16px; background: rgba(255,255,255,0.03); border-radius: 10px; border-left: 3px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
.booking-message-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-muted); margin-bottom: 6px; }
.booking-message-text { font-size: 0.85rem; color: var(--gray-light); line-height: 1.6; font-weight: 300; }

.booking-actions { display: flex; gap: 10px; justify-content: flex-end; }
.action-btn {
  padding: 10px 24px; border-radius: 8px; font-family: var(--sans); font-size: 0.8rem;
  font-weight: 600; cursor: pointer; transition: var(--transition); border: none;
}
.action-btn.accept { background: var(--green); color: var(--white-pure); box-shadow: 0 4px 16px rgba(52,199,89,0.3); }
.action-btn.accept:hover { filter: brightness(1.1); transform: translateY(-1px); }
.action-btn.decline { background: rgba(255,255,255,0.06); color: var(--gray-light); border: 1px solid rgba(255,255,255,0.1); }
.action-btn.decline:hover { background: var(--red-subtle); border-color: rgba(200,16,46,0.2); color: var(--red); }

/* Empty state */
.empty-state { text-align: center; padding: 80px 20px; }
.empty-state .icon { font-size: 3rem; opacity: 0.3; margin-bottom: 16px; }
.empty-state h3 { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; margin-bottom: 8px; }
.empty-state p { color: var(--gray); font-size: 0.9rem; }

/* Toast */
.toast { position: fixed; top: 88px; right: 24px; padding: 14px 24px; background: var(--dark-card); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; font-size: 0.85rem; font-weight: 500; color: var(--white); z-index: 2000; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.toast.success { border-color: rgba(52,199,89,0.3); }
.toast.error { border-color: rgba(200,16,46,0.3); }
.toast.show { transform: translateX(0); }

.loading-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--black); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; transition: opacity 0.5s ease; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 700px) {
  .page { padding: 92px 20px 100px; }
  nav { padding: 0 20px; }
  .booking-details { grid-template-columns: repeat(2, 1fr); }
  .booking-top { flex-direction: column; gap: 12px; }
  .booking-actions { justify-content: stretch; }
  .action-btn { flex: 1; text-align: center; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading bookings...</div>
</div>

<div class="toast" id="toast"></div>
<div class="ambient"><div class="orb"></div><div class="orb"></div></div>

<nav>
  <a href="index.html" class="nav-logo">OFFSHIFT</a>
  <div class="nav-links">
    <a href="browse.html">Browse</a>
    <a href="pro-dashboard.html">Dashboard</a>
  </div>
  <div class="nav-user">
    <div class="nav-avatar" id="navAvatar"><span id="navInitials">?</span></div>
    <button class="nav-signout" id="signOutBtn">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Your <em>Bookings</em></h1>
    <p>Review requests from clients, accept or decline, and manage your schedule.</p>
  </div>

  <div class="sub-nav">
    <a href="pro-dashboard.html">Profile</a>
    <a href="pro-availability.html">Availability</a>
    <a href="pro-bookings.html" class="active">Bookings</a>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-filter="all">All <span class="count" id="countAll">0</span></button>
    <button class="filter-tab" data-filter="pending">Pending <span class="count" id="countPending">0</span></button>
    <button class="filter-tab" data-filter="confirmed">Confirmed <span class="count" id="countConfirmed">0</span></button>
    <button class="filter-tab" data-filter="declined">Declined <span class="count" id="countDeclined">0</span></button>
    <button class="filter-tab" data-filter="completed">Completed <span class="count" id="countCompleted">0</span></button>
  </div>

  <div class="bookings-list" id="bookingsList">
    <div class="empty-state">
      <div class="icon">&#128197;</div>
      <h3>No bookings yet</h3>
      <p>When clients send booking requests, they'll appear here.</p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="notifications.js"></script>
<script src="mobile-nav.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDNOD676C2uh87ggzmSZFNldI2eyI-ECOQ",
  authDomain: "offshift-charleston.firebaseapp.com",
  projectId: "offshift-charleston",
  storageBucket: "offshift-charleston.firebasestorage.app",
  messagingSenderId: "168641222703",
  appId: "1:168641222703:web:63c86ca2ce807272a8ceda"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const $ = id => document.getElementById(id);
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let currentUser = null;
let allBookings = [];
let currentFilter = 'all';

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  initNotifications(user.uid);

  const initials = user.displayName ? user.displayName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2) : user.email[0].toUpperCase();
  $('navInitials').textContent = initials;
  if (user.photoURL) $('navAvatar').innerHTML = `<img src="${user.photoURL}" alt="">`;

  // Listen to bookings in real time
  db.collection('bookings')
    .where('proId', '==', user.uid)
    .orderBy('createdAt', 'desc')
    .onSnapshot(snap => {
      allBookings = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      updateCounts();
      renderBookings();
    }, err => {
      console.error('Bookings listen error:', err);
      showToast('Error loading bookings', 'error');
    });

  $('loadingOverlay').classList.add('hidden');
});

// ─── Counts ───
function updateCounts() {
  $('countAll').textContent = allBookings.length;
  $('countPending').textContent = allBookings.filter(b => b.status === 'pending').length;
  $('countConfirmed').textContent = allBookings.filter(b => b.status === 'confirmed').length;
  $('countDeclined').textContent = allBookings.filter(b => b.status === 'declined').length;
  $('countCompleted').textContent = allBookings.filter(b => b.status === 'completed').length;
}

// ─── Filter Tabs ───
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    renderBookings();
  });
});

// ─── Render ───
function renderBookings() {
  const list = $('bookingsList');
  const filtered = currentFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#128197;</div>
        <h3>No ${currentFilter === 'all' ? '' : currentFilter} bookings</h3>
        <p>${currentFilter === 'pending' ? 'No pending requests right now.' : 'Bookings with this status will appear here.'}</p>
      </div>
    `;
    return;
  }

  list.innerHTML = '';
  filtered.forEach(booking => {
    const card = document.createElement('div');
    card.className = 'booking-card';

    const dateDisplay = formatDateNice(booking.date);
    const timeDisplay = formatTime12(booking.time);
    const durationStr = booking.duration === 8 ? 'Full day' : `${booking.duration} hr${booking.duration > 1 ? 's' : ''}`;
    const clientInitial = (booking.clientName || booking.clientEmail || '?')[0].toUpperCase();

    card.innerHTML = `
      <div class="booking-top">
        <div class="booking-client">
          <div class="booking-client-photo" ${booking.clientPhoto ? `style="overflow:hidden;"` : ''}>
            ${booking.clientPhoto ? `<img src="${booking.clientPhoto}" alt="">` : clientInitial}
          </div>
          <div>
            <div class="booking-client-name">${booking.clientName || 'Client'}</div>
            <div class="booking-client-email">${booking.clientEmail || ''}</div>
          </div>
        </div>
        <div class="booking-status status-${booking.status}">${booking.status}</div>
      </div>

      <div class="booking-details">
        <div class="booking-detail">
          <div class="booking-detail-label">Date</div>
          <div class="booking-detail-value">${dateDisplay}</div>
        </div>
        <div class="booking-detail">
          <div class="booking-detail-label">Time</div>
          <div class="booking-detail-value">${timeDisplay}</div>
        </div>
        <div class="booking-detail">
          <div class="booking-detail-label">Duration</div>
          <div class="booking-detail-value">${durationStr}</div>
        </div>
        <div class="booking-detail">
          <div class="booking-detail-label">Total</div>
          <div class="booking-detail-value">$${(booking.estimatedTotal || 0).toLocaleString()}</div>
        </div>
      </div>

      ${booking.message ? `
        <div class="booking-message">
          <div class="booking-message-label">Client Message</div>
          <div class="booking-message-text">${escapeHtml(booking.message)}</div>
        </div>
      ` : ''}

      ${booking.status === 'pending' ? `
        <div class="booking-actions">
          <button class="action-btn decline" onclick="updateBooking('${booking.id}', 'declined')">Decline</button>
          <button class="action-btn accept" onclick="updateBooking('${booking.id}', 'confirmed')">Accept</button>
        </div>
      ` : ''}
    `;

    list.appendChild(card);
  });
}

// ─── Update booking status ───
async function updateBooking(bookingId, newStatus) {
  try {
    await db.collection('bookings').doc(bookingId).update({
      status: newStatus,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Find booking to get client info for notification
    const booking = allBookings.find(b => b.id === bookingId);
    if (booking) {
      const statusMsg = newStatus === 'confirmed'
        ? `Your booking for ${formatDateNice(booking.date)} has been confirmed!`
        : `Your booking request for ${formatDateNice(booking.date)} was declined.`;

      await db.collection('notifications').add({
        userId: booking.clientId,
        type: `booking_${newStatus}`,
        bookingId: bookingId,
        fromName: `${currentUser.displayName || 'Pro'}`,
        message: statusMsg,
        read: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    showToast(`Booking ${newStatus}`, 'success');
  } catch (err) {
    console.error('Update error:', err);
    showToast('Failed to update booking', 'error');
  }
}

// ─── Helpers ───
function formatDateNice(dateStr) {
  if (!dateStr) return '—';
  const [y, m, d] = dateStr.split('-');
  const date = new Date(y, m - 1, d);
  return `${DAY_NAMES[date.getDay()]}, ${MONTH_NAMES[date.getMonth()]} ${parseInt(d)}`;
}

function formatTime12(t) {
  if (!t) return '—';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

$('signOutBtn').onclick = async () => { await auth.signOut(); window.location.href = 'login.html'; };

function showToast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '') + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
